name: server
description: Headless server profile — strict baseline.
include_buckets:
  - kernel
  - auth
  - ssh
  - fs
  - network
  - services
  - packages
  - logging
  - crypto
  - containers
  - cron
  - mac
  - forensic
  - webdb
  - time
exclude_ids:
  # Information-only checks that should be reviewed by hand on a server,
  # not gating on every run.
  - mac.selinux.boolean_drift
  - services.timers.inventory
  - fs.suid.inventory
